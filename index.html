<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kanban Board</title>
  <script defer src="js/vue.js"></script>
  <script defer src="js/main.js"></script>
  <link rel="stylesheet" href="css/main.css">
</head>
<body>
  <div id="app">
    <h1>Kanban Board</h1>
    
    <div class="kanban-board">
      <kanban-column 
        v-for="column in columns" 
        :key="column.id"
        :column="column"
        @create-card="openCreateModal"
        @edit-card="openEditModal"
        @delete-card="deleteCard"
        @move-card="moveCard"
        @return-card="openReturnModal">
      </kanban-column>
    </div>
    <task-form 
      v-if="showForm"
      :mode="modalMode"
      :card="selectedCard"
      @close="closeForm"
      @submit="handleFormSubmit">
    </task-form>
    <return-form 
      v-if="showReturnForm"
      :card="cardForReturn"
      @close="closeReturnForm"
      @submit-return="handleReturnSubmit">
    </return-form>
  </div>
</body>
</html>
